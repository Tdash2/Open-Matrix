<!DOCTYPE html>
<html>
<head>
    <title>Labels</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav>
        <a href="/">Crosspoints</a>
        <a href="/labels.html">Labels</a>
    </nav>

    <h1>Port Labels</h1>

    <div class="grid">

        <div class="panel">
            <h2>Outputs</h2>
            <table>
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Name</th>
                    </tr>
                </thead>
                <tbody id="outputs"></tbody>
            </table>
        </div>

        <div class="panel">
            <h2>Inputs</h2>
            <table>
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Name</th>
                    </tr>
                </thead>
                <tbody id="inputs"></tbody>
            </table>
        </div>

    </div>

    <script src="labels.js"></script>

</body>
</html>

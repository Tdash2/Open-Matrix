<!DOCTYPE html>
<html>
<head>
    <title>Intercom Matrix PartyLines</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <nav class="navbar">
        <div class="logo">
            <a  href="/" style="padding: 0; border: none;">
                <img src="Open Matrix Transparent.png" alt="Crosspoints Logo">
                </a>
        </div>

        <div class="nav-links">
            <a href="/">Crosspoints</a>
            <a href="/labels.html">Labels</a>
            <a href="/partylines.html">PartyLines</a>
        </div>
    </nav>
    <div class="body2">


        <div id="busyOverlay" style="
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.4);
    z-index:9999;
    color:white;
    font-size:24px;
    font-weight:bold;
    align-items:center;
    justify-content:center;
">
            Applying Partyline Changes...
        </div>

        <h1>Partyline</h1>

        <div class="header-row">
            <div class="controls">

                <div class="left-col">
                    <label>Select Partyline</label>
                    <div class="row">
                        <select id="plSelect" onchange="onPartyLineChange()">
                            <option value="">-- Select PartyLine --</option>
                        </select>
                    </div>
                </div>

                <div class="right-col">
                    <div class="field-group">
                        <label style=" text-align: left; ">Add A New Partyline</label>
                        <div class="row">
                            <input id="newPlName">
                            <button onclick="createPartyLine()">Create</button>
                        </div>
                    </div>
                </div>

            </div>
        </div>



        <div id="details">
            <H2>Select a Partyline</H2>
        </div>




        <script src="partylines.js"></script>
    </div>
</body>
</html>
